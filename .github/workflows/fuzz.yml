name: fuzz

on:
  pull_request:
  schedule:
    - cron: "0 3 * * 1" # Weekly, Mondays 03:00 UTC.
  workflow_dispatch:
    inputs:
      fuzztime:
        description: "Per-target fuzz duration (e.g. 30s, 5m, 1h)"
        type: string
        default: "5m"

permissions:
  contents: read

env:
  GO_VERSION: "1.24"

jobs:
  fuzz:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # `make fuzz` discovers and runs every Fuzz* target (currently
      # x509gost.FuzzParseCertificate). PR runs stay short; the weekly
      # schedule and manual dispatch fuzz longer. The committed seed corpus
      # is replayed by the test workflow's `go test` regardless.
      - name: fuzz all targets
        run: make fuzz FUZZTIME=${{ inputs.fuzztime || '1m' }}
