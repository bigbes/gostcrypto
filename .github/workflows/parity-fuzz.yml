name: parity-fuzz

# Actively fuzzes the clean-room <-> gogost differential targets (compat's
# ./parity/... FuzzXxx) against THIS commit, to shake out divergences the
# pinned seed corpora don't already cover.
#
# Same sibling-checkout layout as parity.yml: the parity targets build against
# the gostcrypto tree under test (the PR/branch), not gostcrypto master. Kept in
# a SEPARATE workflow from `parity` so the required, fast `parity` status check
# stays engine-free and quick — this job carries the longer fuzz budget.
#
# All 22 parity fuzz targets are in-process (clean-room vs gogost); none shell
# out to the gost-engine CLI, so no engine build is needed here.

on:
  pull_request:
  schedule:
    - cron: "0 4 * * 1" # Weekly, Mondays 04:00 UTC (after the gostcrypto `fuzz` job at 03:00).
  workflow_dispatch:
    inputs:
      fuzztime:
        description: "Per-target fuzz duration (e.g. 30s, 5m, 1h)"
        type: string
        default: "5m"
      compat-ref:
        description: "gostcrypto-compat ref to fuzz against (branch/tag/sha)"
        type: string
        default: master

permissions:
  contents: read

env:
  GO_VERSION: "1.24"

jobs:
  parity-fuzz:
    runs-on: ubuntu-latest
    steps:
      # This repo (the commit under test) -> ./gostcrypto
      - uses: actions/checkout@v4
        with:
          path: gostcrypto

      # The parity fuzz targets + vendored gogost reference -> ./gostcrypto-compat.
      # Its `replace ../gostcrypto` resolves to the checkout above.
      - uses: actions/checkout@v4
        with:
          repository: bigbes/gostcrypto-compat
          ref: ${{ github.event.inputs.compat-ref || 'master' }}
          path: gostcrypto-compat

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # compat's `make fuzz` discovers and runs every ./parity/... FuzzXxx target.
      # PR runs stay short; the weekly schedule and manual dispatch fuzz longer.
      # Committed seed corpora are replayed by the `parity` workflow's `go test`
      # regardless of this job.
      - name: fuzz parity differentials
        working-directory: gostcrypto-compat
        run: make fuzz FUZZTIME=${{ github.event.inputs.fuzztime || (github.event_name == 'schedule' && '5m' || '30s') }}
